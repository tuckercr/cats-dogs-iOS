name: iOS CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.4"

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Prepare Xcode
        run: sudo xcodebuild -runFirstLaunch

      - name: Start iOS Simulator
        uses: futureware-tech/simulator-action@v4
        id: simulator
        with:
          model: iPhone 16
          os_version: "^18.0"
          shutdown_after_job: "false"

      - name: Create Secrets.plist
        env:
          OWM_API_KEY: ${{ secrets.OWM_API_KEY }}
        run: |
          cp "Cats&Dogs/Secrets.example.plist" "Cats&Dogs/Secrets.plist"
          if [ -n "$OWM_API_KEY" ]; then
            /usr/libexec/PlistBuddy -c "Set :OWM_API_KEY $OWM_API_KEY" "Cats&Dogs/Secrets.plist"
          fi

      - name: Build and test
        run: |
          set -o pipefail
          xcodebuild test \
            -project "Cats&Dogs.xcodeproj" \
            -scheme "Cats&Dogs" \
            -destination "platform=iOS Simulator,id=${{ steps.simulator.outputs.udid }}" \
            -resultBundlePath TestResults \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults.xcresult
