name: iOS CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          # This project targets iOS 26.5; use the newest Xcode image on the runner.
          xcode-version: latest

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Create Secrets.plist
        env:
          OWM_API_KEY: ${{ secrets.OWM_API_KEY }}
        run: |
          cp "Cats&Dogs/Secrets.example.plist" "Cats&Dogs/Secrets.plist"
          if [ -n "$OWM_API_KEY" ]; then
            /usr/libexec/PlistBuddy -c "Set :OWM_API_KEY $OWM_API_KEY" "Cats&Dogs/Secrets.plist"
          fi

      - name: Resolve iOS Simulator destination
        id: simulator
        run: |
          DEVICE_ID=$(python3 <<'PY'
          import json
          import subprocess

          data = json.loads(subprocess.check_output(
              ["xcrun", "simctl", "list", "devices", "available", "-j"],
              text=True,
          ))
          runtimes = sorted(
              (k for k in data.get("devices", {}) if "iOS" in k),
              reverse=True,
          )
          for runtime in runtimes:
              for device in data["devices"][runtime]:
                  if not device.get("isAvailable"):
                      continue
                  name = device.get("name", "")
                  if name.startswith("iPhone"):
                      print(device["udid"])
                      raise SystemExit
          raise SystemExit("No available iPhone simulator found")
          PY
          )
          echo "device_id=$DEVICE_ID" >> "$GITHUB_OUTPUT"
          echo "Using simulator id: $DEVICE_ID"

      - name: Build and test
        run: |
          set -o pipefail
          xcodebuild test \
            -project "Cats&Dogs.xcodeproj" \
            -scheme "Cats&Dogs" \
            -destination "platform=iOS Simulator,id=${{ steps.simulator.outputs.device_id }}" \
            -resultBundlePath TestResults \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults.xcresult
