name: iOS CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          # This project targets iOS 26.5; use the newest Xcode image on the runner.
          xcode-version: latest

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install iOS Simulator platform
        run: xcodebuild -downloadPlatform iOS

      - name: Create Secrets.plist
        env:
          OWM_API_KEY: ${{ secrets.OWM_API_KEY }}
        run: |
          cp "Cats&Dogs/Secrets.example.plist" "Cats&Dogs/Secrets.plist"
          if [ -n "$OWM_API_KEY" ]; then
            /usr/libexec/PlistBuddy -c "Set :OWM_API_KEY $OWM_API_KEY" "Cats&Dogs/Secrets.plist"
          fi

      - name: Resolve iOS Simulator destination
        id: simulator
        run: |
          DESTINATION=$(xcodebuild -showdestinations \
            -project "Cats&Dogs.xcodeproj" \
            -scheme "Cats&Dogs" 2>/dev/null | python3 -c "
          import sys, re
          for line in sys.stdin:
              if 'platform:iOS Simulator' not in line or 'placeholder' in line:
                  continue
              if 'name:iPhone' not in line:
                  continue
              match = re.search(r'id:([0-9A-F-]+)', line)
              if match:
                  print(f'platform=iOS Simulator,id={match.group(1)}')
                  break
          ")
          if [ -z "$DESTINATION" ]; then
            echo 'Available destinations:'
            xcodebuild -showdestinations -project "Cats&Dogs.xcodeproj" -scheme "Cats&Dogs" || true
            exit 1
          fi
          echo "destination=$DESTINATION" >> "$GITHUB_OUTPUT"
          echo "Using destination: $DESTINATION"

      - name: Build and test
        run: |
          set -o pipefail
          xcodebuild test \
            -project "Cats&Dogs.xcodeproj" \
            -scheme "Cats&Dogs" \
            -destination "${{ steps.simulator.outputs.destination }}" \
            -resultBundlePath TestResults \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults.xcresult
